services:
  - type: web
    name: redi-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers 2 --timeout 120
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: redi-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: WTF_CSRF_ENABLED
        value: "True"

databases:
  - name: redi-db
    databaseName: redi
    user: redi
    plan: free
    postgresMajorVersion: 16
